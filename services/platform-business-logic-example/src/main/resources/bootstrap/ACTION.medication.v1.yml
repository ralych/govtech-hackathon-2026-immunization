grammar: FHIRConnect/v1.0.0
type: model
metadata:
  name: ACTION.medication.v1
  version: 0.0.1-alpha
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-ACTION.medication.v1
    revision: 1.3.0
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Immunization

mappings:
  - name: "vaccineCode"
    with:
      fhir: "$resource.vaccineCode"
      openehr: "$archetype/description[at0017]/items[at0020]"

  - name: "occurrenceDateTime"
    with:
      fhir: "$resource.occurrence.ofType(dateTime)"
      openehr: "$archetype/time"

  - name: "lotNumber"
    with:
      fhir: "$resource.lotNumber"
      openehr: "$archetype/description[at0017]/items[openEHR-EHR-CLUSTER.medication.v2]/items[at0150]"

  - name: "site"
    with:
      fhir: "$resource.site"
      openehr: "$archetype/description[at0017]/items[at0140]/items[at0141]"

  - name: "route"
    with:
      fhir: "$resource.route"
      openehr: "$archetype/description[at0017]/items[at0140]/items[at0147]"

  - name: "doseNumber"
    with:
      fhir: "$resource.protocolApplied.doseNumber.ofType(positiveInt)"
      openehr: "$archetype/description[at0017]/items[at0025]"

  - name: "ISMTransition_current_state_completed"
    with:
      fhir: "$resource"
      openehr: "$archetype/ism_transition/current_state"
    manual:
      - name: "completed"
        fhirCondition:
          targetRoot: "$fhirRoot"
          targetAttribute: "status"
          operator: "one of"
          criteria: "completed"
        openehr:
          - path: "defining_code/terminology_id"
            value: "openehr"
          - path: "defining_code/code_string"
            value: "245"
          - path: "value"
            value: "active"
        fhir:
          - path: "status"
            value: "completed"

  - name: "ISMTransition_careflow_step_completed"
    with:
      fhir: "$resource"
      openehr: "$archetype/ism_transition/careflow_step"
    manual:
      - name: "doseAdministered"
        fhirCondition:
          targetRoot: "$fhirRoot"
          targetAttribute: "status"
          operator: "one of"
          criteria: "completed"
        openehr:
          - path: "defining_code/terminology_id"
            value: "local"
          - path: "defining_code/code_string"
            value: "at0006"
          - path: "value"
            value: "Dose administered"
        fhir:
          - path: "status"
            value: "completed"
