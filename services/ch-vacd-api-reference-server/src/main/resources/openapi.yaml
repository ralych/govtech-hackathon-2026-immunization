openapi: 3.1.0
info:
  title: Swagger CH-VACD API Reference Server
  version: 1.0.11
paths:
  /Patient/{id}:
    get:
      summary: "Get the patient by its id."
      description: "This method does make a lookup for the patient in the local CI database according to the given ADC-PID"
      externalDocs:
        url: https://fhir.ch/ig/ch-vacd/CapabilityStatement-ch-vacd-api-capstmt-srv.html#Patient1-10
      responses:
        "200":
          description: Success
          content:
            application/fhir+json:
              example: {"resourceType":"Patient","meta":{"profile":["http://fhir.ch/ig/ch-core/StructureDefinition/ch-core-patient"]},"text":{"status":"generated","div":"<div xmlns=\"http://www.w3.org/1999/xhtml\">This is Monika Wegmueller</div>"},"identifier":[{"system":"urn:ietf:rfc:3986","value":"urn:uuid:4ce0593e-0353-4874-8cee-00d2de6b719d","use":"usual"}],"active":true,"name":[{"family":"Wegmueller","given":["Monika"]}],"telecom":[{"system":"phone","value":"tel:+41.32.685.12.34"}],"gender":"female","birthDate":"1967-02-10","address":[{"line":["Leidensweg 10"],"city":"Specimendorf","postalCode":"9876","country":"CH"}]}
    delete:
      summary: "Delete the patient by its id."
      externalDocs:
        url: https://fhir.ch/ig/ch-vacd/CapabilityStatement-ch-vacd-api-capstmt-srv.html#Patient1-10
    put:
      summary: "Update the patient by its id."
      externalDocs:
        url: https://fhir.ch/ig/ch-vacd/CapabilityStatement-ch-vacd-api-capstmt-srv.html#Patient1-10
      requestBody:
       content:
         application/fhir+json:
           example: {"resourceType":"Patient","id":"4febb93e-6143-42f9-b57e-c62dfb35de84",meta":{"profile":["http://fhir.ch/ig/ch-core/StructureDefinition/ch-core-patient"]},"text":{"status":"generated","div":"<div xmlns=\"http://www.w3.org/1999/xhtml\">This is Monika Wegmueller</div>"},"identifier":[{"system":"urn:ietf:rfc:3986","value":"urn:uuid:4ce0593e-0353-4874-8cee-00d2de6b719d","use":"usual"}],"active":true,"name":[{"family":"Wegmueller","given":["Monika"]}],"telecom":[{"system":"phone","value":"tel:+41.32.685.12.34"}],"gender":"female","birthDate":"1967-02-10","address":[{"line":["Leidensweg 10"],"city":"Specimendorf","postalCode":"9876","country":"CH"}]}
  /Patient/{id}/$export-document:
    post:
      summary: "Export Vaccination Record as a document bundle."
      description: "This method creats a document bundle containing the vaccination record of the patient according to the given ADC-PID. The document bundle contains a composition resource and all referenced resources (e.g. immunization, practitioner, organization, etc.)."
      externalDocs:
        url: https://fhir.ch/ig/ch-vacd/OperationDefinition-ch-vacd-patient-export-operation.html
      requestBody:
        content:
          application/fhir+json:
            example: { "resourceType": "Parameters", "parameter": [{ "name": "type", "valueCoding": { "system": "urn:oid:2.16.756.5.30.1.127.3.10.10", "code": "urn:che:epr:ch-vacd:vaccination-record:2022" } } ] }
      responses:
        "200": 
          description: Success
          content:
            application/fhir+json:
              example: { "resourceType": "Bundle","id":"f8b9c1e7-5a0c-4d9e-8b3c-2a1e5f6d7c8e" }
  /Patient:
    post:
      summary: "Create a new patient."
      description: ""
      externalDocs:
        url: https://fhir.ch/ig/ch-vacd/CapabilityStatement-ch-vacd-api-capstmt-srv.html#Patient1-10
      requestBody:
        content:
          application/fhir+json:
            example: {"resourceType":"Patient","meta":{"profile":["http://fhir.ch/ig/ch-core/StructureDefinition/ch-core-patient"]},"text":{"status":"generated","div":"<div xmlns=\"http://www.w3.org/1999/xhtml\">This is Monika Wegmueller</div>"},"identifier":[{"system":"urn:ietf:rfc:3986","value":"urn:uuid:4ce0593e-0353-4874-8cee-00d2de6b719d","use":"usual"}],"active":true,"name":[{"family":"Wegmueller","given":["Monika"]}],"telecom":[{"system":"phone","value":"tel:+41.32.685.12.34"}],"gender":"female","birthDate":"1967-02-10","address":[{"line":["Leidensweg 10"],"city":"Specimendorf","postalCode":"9876","country":"CH"}]}
      responses:
        "200":
          description: Success
          content:
            application/fhir+json:
              example: { "resourceType": "Patient", "id": "888bc580-b94a-4a21-9898-184bacc528e9", "meta": { "profile": [ "http://fhir.ch/ig/ch-core/StructureDefinition/ch-core-patient-epr" ] } }
        "201":
          description: Created
          content:
            application/fhir+json:
              example: { "resourceType": "Patient", "id": "888bc580-b94a-4a21-9898-184bacc528e9", "meta": { "profile": [ "http://fhir.ch/ig/ch-core/StructureDefinition/ch-core-patient-epr" ] } }
    get:
      summary: "Search for a patient by search parameters"
      description: "This method does make a lookup for the patient in the database according to the given parameters."
      externalDocs:
          url: https://fhir.ch/ig/ch-core/StructureDefinition-ch-core-patient.html
      parameters:
        - in: query
          name: birthdate
          description: The patient's date of birth. 
          schema:
            type: string
        - in: query
          name: family
          description: A portion of the family name of the patient. 
          schema:
            type: string
        - in: query
          name: given
          description: A portion of the given name of the patient. 
          schema:
            type: string
        - in: query
          name: gender
          description: Gender of the patient.
          schema:
            type: string
            enum: [MALE,FEMALE,OTHER,UNKNOWN]
        - in: query
          name: identifier
          description: A patient identifier.
          schema:
            type: string     
      responses:
        "200":
          description: Success
          content:
            application/fhir+json:
              example: { "resourceType": "Bundle", "id": "58cd564d-2f8e-4639-98c7-d92c4faa58ed", "meta": { "lastUpdated": "2023-03-20T13:35:45.305+01:00" }, "type": "searchset", "total": 2}

