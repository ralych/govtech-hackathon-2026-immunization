openapi: 3.0.3
info:
  title: Impfungs API
  version: 1.0.0
paths:
  /patients/{patientId}:
    get:
      summary: Ruft die Stammdaten und alle Impfungen eines spezifischen Patienten ab
      description: Liefert die minimalen Stammdaten des Patienten sowie eine flache Liste aller verabreichten Impfungen.
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Die eindeutige ID des Patienten
      responses:
        '200':
          description: Erfolgreiche Abfrage des Patientendossiers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDossierDto'
components:
  schemas:
    PatientDossierDto:
      type: object
      description: Das vollständige Dossier eines Patienten einschliesslich seiner Impfungen
      properties:
        id:
          type: string
          format: uuid
          example: "a8b3c4d5-e6f7-8a9b-0c1d-2e3f4a5b6c7d"
          description: Eindeutige ID des Patienten
        firstName:
          type: string
          example: "Anna"
        lastName:
          type: string
          example: "Schmid"
        age:
          type: integer
          example: 41
        gender:
          type: string
          example: "weiblich"
        vaccinations:
          type: array
          items:
            $ref: '#/components/schemas/VaccinationDto'
          description: Flache Liste aller Impfungen dieses Patienten
      required:
        - id
        - firstName
        - lastName
        - age
        - gender
        - vaccinations

    VaccinationDto:
      type: object
      description: Repräsentiert einen einzelnen Impfeintrag
      properties:
        id:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        targetDisease:
          type: string
          example: "Influenza (saisonal)"
          description: Die Zielkrankheit für die Gruppierung im Frontend
        vaccineName:
          type: string
          example: "Fluarix Tetra"
        season:
          type: string
          example: "Saison 25/26"
        doseSequence:
          type: string
          example: "1/2"
        vaccinationDate:
          type: string
          format: date
          example: "2025-10-14"
        manufacturer:
          type: string
          example: "GlaxoSmithKline"
        lotNumber:
          type: string
          example: "FLU2425"
        administrationRoute:
          type: string
          example: "i.m."
        siteOfAdministration:
          type: string
          example: "Oberarm links"
      required:
        - id
        - targetDisease
        - vaccineName
        - vaccinationDate
        - manufacturer
        - lotNumber