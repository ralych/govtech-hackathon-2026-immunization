openapi: 3.0.3
info:
  title: Impfungs API
  version: 1.0.0
paths:
  /patients/{patientId}:
    get:
      summary: Ruft die Stammdaten und alle Impfungen eines spezifischen Patienten ab
      description: Liefert die minimalen Stammdaten des Patienten sowie eine flache Liste aller verabreichten Impfungen.
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Die eindeutige ID des Patienten
      responses:
        '200':
          description: Erfolgreiche Abfrage des Patientendossiers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDossierDto'
components:
  schemas:
    PatientDossierDto:
      type: object
      description: Das vollständige Dossier eines Patienten einschliesslich seiner Impfungen
      properties:
        firstName:
          type: string
          example: "Anna"
        lastName:
          type: string
          example: "Schmid"
        age:
          type: integer
          example: 41
        gender:
          type: string
          example: "weiblich"
        vaccinations:
          type: array
          items:
            $ref: '#/components/schemas/VaccinationDto'
          description: Flache Liste aller Impfungen dieses Patienten
      required:
        - firstName
        - lastName
        - age
        - gender
        - vaccinations

    VaccinationDto:
      type: object
      description: Repräsentiert einen einzelnen Impfeintrag
      properties:
        targetDisease:
          type: string
          example: "Influenza (saisonal)"
          description: Die Zielkrankheit für die Gruppierung im Frontend
        vaccineName:
          type: string
          example: "Fluarix Tetra"
        vaccineCode:
          type: string
          example: "68710-01"
        season:
          type: string
          example: "Saison 25/26"
        doseSequence:
          type: string
          example: "1/2"
        vaccinationDate:
          type: string
          format: date
          example: "2025-10-14"
        manufacturer:
          type: string
          example: "GlaxoSmithKline"
        lotNumber:
          type: string
          example: "FLU2425"
        administrationRoute:
          type: string
          example: "i.m."
        siteOfAdministration:
          type: string
          example: "Oberarm links"
        vaccinationReason:
          type: object
          description: Der Grund für die Impfung basierend auf dem Schweizer Risks ValueSet (http://fhir.ch/ig/ch-vacd/ValueSet/ch-vacd-risks-vs)
          properties:
            code:
              type: string
              example: "223366009"
              description: Der offizielle SNOMED CT-Code oder Schweizer Risikocode (z. B. "223366009" für berufliche Risikogruppe)
            display:
              type: string
              example: "Healthcare professional"
              description: Der offizielle Display-Name des Codes
            swissLabel:
              type: string
              example: "Risikogruppe — beruflich"
              description: Die praxisnahe Bezeichnung auf Deutsch für die Schweizer Benutzeroberfläche
          required:
            - code
            - display
        doseNumber:
          type: string
          example: "1"
          description: Die aktuelle Dosisnummer in der Impfserie (z. B. "1", "2"). Bei einer Booster-Impfung kann dieses Feld leer gelassen werden oder "Booster" enthalten.
        seriesDoses:
          type: string
          example: "2"
          description: Die Gesamtzahl der vorgesehenen Dosen in der Impfserie (z. B. "2", "3"). Bei einer Booster-Impfung kann dieses Feld leer gelassen werden.
      required:
        - targetDisease
        - vaccineName
        - vaccinationDate
        - manufacturer
        - lotNumber