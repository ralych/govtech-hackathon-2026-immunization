<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Impfdossier CH — Anmelden</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #e8edf5 0%, #d5ddee 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .login-card h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1f36;
      margin-bottom: .25rem;
    }

    .login-card .subtitle {
      font-size: .875rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: .375rem;
    }

    .form-group input {
      width: 100%;
      padding: .625rem .75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
      transition: border-color .15s;
    }

    .form-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }

    .error-msg {
      display: none;
      background: #fef2f2;
      color: #b91c1c;
      font-size: .875rem;
      padding: .625rem .75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border: 1px solid #fecaca;
    }

    .error-msg.visible { display: block; }

    button {
      width: 100%;
      padding: .75rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .5s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .login-card .hint {
      margin-top: 1.5rem;
      font-size: .8rem;
      color: #9ca3af;
      text-align: center;
    }

    .login-card .hint code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .8rem;
      background: #f3f4f6;
      padding: .125rem .375rem;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Impfdossier CH</h1>
    <p class="subtitle">Bitte melden Sie sich an</p>

    <div id="error" class="error-msg" role="alert"></div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" placeholder="z. B. patient1" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" placeholder="pass123" required />
      </div>
      <button type="submit" id="submit-btn">
        <span id="btn-label">Anmelden</span>
      </button>
    </form>

    <p class="hint">
      Demo: <code>patient1</code> … <code>patient4</code> / <code>doctor1</code> · Passwort <code>pass123</code>
    </p>
  </div>

  <script>
    (function () {
      const form = document.getElementById('login-form');
      const username = document.getElementById('username');
      const password = document.getElementById('password');
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('submit-btn');
      const btnLabel = document.getElementById('btn-label');

      const REDIRECTS = {
        doctor:  '/producer/',
        patient: '/consumer/',
      };

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
      }

      function hideError() {
        errorEl.classList.remove('visible');
        errorEl.textContent = '';
      }

      function setLoading(loading) {
        btn.disabled = loading;
        btnLabel.innerHTML = loading
          ? '<span class="spinner"></span>Wird angemeldet …'
          : 'Anmelden';
      }

      function base64(str) {
        return btoa(unescape(encodeURIComponent(str)));
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideError();

        const user = username.value.trim();
        const pass = password.value;
        if (!user || !pass) {
          showError('Bitte Benutzername und Passwort eingeben.');
          return;
        }

        setLoading(true);

        try {
          const res = await fetch('/api/authenticate', {
            method: 'POST',
            headers: {
              'Authorization': 'Basic ' + base64(user + ':' + pass),
            },
          });

          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            showError(body.error || 'Anmeldung fehlgeschlagen.');
            setLoading(false);
            return;
          }

          const data = await res.json();
          sessionStorage.setItem('auth', JSON.stringify(data));

          const target = REDIRECTS[data.role] || 'http://localhost:3003/login.html';
          window.location.replace(target);
        } catch (err) {
          showError('Verbindungsfehler – konnte den IAM-Service nicht erreichen.');
          setLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
