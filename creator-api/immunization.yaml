openapi: 3.0.3
info:
  title: Impfkomponenten-Erfassung API
  version: 1.0.0
paths: {}
components:
  schemas:
    PatientDossierDto:
      type: object
      description: Das vollständige Dossier eines Patienten einschliesslich seiner Impfungen
      properties:
        id:
          type: string
          format: uuid
          example: "a8b3c4d5-e6f7-8a9b-0c1d-2e3f4a5b6c7d"
        firstName:
          type: string
          example: "Anna"
        lastName:
          type: string
          example: "Schmid"
        age:
          type: integer
          example: 41
        gender:
          type: string
          example: "weiblich"
        vaccinations:
          type: array
          items:
            $ref: '#/components/schemas/VaccinationDto'
          description: Flache Liste aller Impfungen dieses Patienten
      required:
        - id
        - firstName
        - lastName
        - age
        - gender
        - vaccinations

    VaccinationDto:
      type: object
      description: Ein einzelner Impfeintrag
      properties:
        id:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        targetDisease:
          type: string
          example: "Influenza (saisonal)"
        vaccineName:
          type: string
          example: "Fluarix Tetra"
        season:
          type: string
          example: "Saison 25/26"
        doseSequence:
          type: string
          example: "1/2"
        vaccinationDate:
          type: string
          format: date
          example: "2025-10-14"
        manufacturer:
          type: string
          example: "GlaxoSmithKline"
        lotNumber:
          type: string
          example: "FLU2425"
        administrationRoute:
          type: string
          example: "i.m."
        siteOfAdministration:
          type: string
          example: "Oberarm links"
        doseNumber:
          type: string
          example: "1"
          description: Die aktuelle Dosisnummer in der Impfserie (z. B. "1", "2"). Bei einer Booster-Impfung kann dieses Feld leer gelassen werden oder "Booster" enthalten.
        seriesDoses:
          type: string
          example: "2"
          description: Die Gesamtzahl der vorgesehenen Dosen in der Impfserie (z. B. "2", "3"). Bei einer Booster-Impfung kann dieses Feld leer gelassen werden.
        vaccinationReason:
          type: object
          description: Der Grund für die Impfung basierend auf dem Schweizer Risks ValueSet (http://fhir.ch/ig/ch-vacd/ValueSet/ch-vacd-risks-vs)
          properties:
            code:
              type: string
              example: "223366009"
              description: Der offizielle SNOMED CT-Code oder Schweizer Risikocode (z. B. "223366009" für berufliche Risikogruppe)
            display:
              type: string
              example: "Healthcare professional"
              description: Der offizielle Display-Name des Codes
            swissLabel:
              type: string
              example: "Risikogruppe — beruflich"
              description: Die praxisnahe Bezeichnung auf Deutsch für die Schweizer Benutzeroberfläche
          required:
            - code
            - display
      required:
        - id
        - targetDisease
        - vaccineName
        - vaccinationDate
        - manufacturer
        - lotNumber