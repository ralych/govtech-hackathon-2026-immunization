openapi: 3.1.0
info:
  title: Impfdossier CH — Creator (Doctor) API
  version: 0.1.0
  summary: BFF contract for the doctor-facing Impfdossier CH frontend.
  description: |
    Backend-for-frontend (BFF) contract for the **doctor-facing** Impfdossier CH
    app (`frontend/frontend-creator`, prototyped in `frontend/1`).

    The frontend never speaks FHIR or openEHR directly. It speaks this small,
    UI-shaped domain API. The mini-backend that implements this spec owns the
    translation: when the doctor records a vaccination (`POST
    /patients/{patientId}/vaccinations`), the backend assembles a **CH VACD
    Immunization Administration Document** and pushes it through the team's
    platform layer into the openEHR CDR. Reads are served back in the same
    UI-shaped domain model.

    ### What this contract covers
      * `GET /me` — the signed-in practitioner (drives the audit/signature line).
      * `GET /patients` — search, filter and sort the practice's patients.
      * `GET /patients/{patientId}` — one patient's demographics.
      * `GET /patients/{patientId}/vaccinations` — that patient's history.
      * `POST /patients/{patientId}/vaccinations` — **record a vaccination** (the
        producer step → CH VACD Immunization Administration Document).
      * `GET /catalogs` — the controlled lists that populate the form dropdowns.

    ### Out of scope (deliberately)
      * **Authentication.** No security scheme is defined; the mini-backend is
        expected to handle practitioner identity out of band for the hackathon.
      * **FHIR/openEHR shapes.** They live behind this API, not in it.

# Intentionally unauthenticated for the hackathon: an empty top-level
# `security` declares that no authentication is required. The mini-backend is
# expected to resolve practitioner identity out of band.
security: []
servers:
  - url: http://localhost:8080/api/v1
    description: >
      Local mini-backend. 8080 is within the host-port range the dev container
      reserves for participant services (3000-3001, 8000-8001, 8080-8081,
      8888-8889). Placeholder — pick any reserved port for your backend.

tags:
  - name: Practitioner
    description: The signed-in doctor.
  - name: Patients
    description: Browse and search patients.
  - name: Vaccinations
    description: Read history and record new doses.
  - name: Catalogs
    description: Controlled lists for the entry form.

paths:
  /me:
    get:
      operationId: getCurrentPractitioner
      tags: [Practitioner]
      summary: Get the signed-in practitioner
      description: >
        Returns the practitioner whose identity the backend is acting under.
        The frontend renders this in the entry form's audit/signature line
        ("Dieser Eintrag wird signiert mit … · GLN …").
      responses:
        '200':
          description: The current practitioner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practitioner'

  /patients:
    get:
      operationId: listPatients
      tags: [Patients]
      summary: Search, filter and sort patients
      description: |
        Backs the patient-list screen. All filtering/sorting is server-side so
        the frontend can stay thin.

        `q` is a free-text query matched (case-insensitively) against name,
        e-mail, address, phone, date of birth, AHV number and patient id —
        mirroring the prototype's client-side search.
      parameters:
        - name: q
          in: query
          description: Free-text search across name, e-mail, address, phone, DOB, AHV and id.
          required: false
          schema:
            type: string
          example: schmid
        - name: sex
          in: query
          description: Filter by administrative sex.
          required: false
          schema:
            $ref: '#/components/schemas/Sex'
        - name: ageBand
          in: query
          description: Filter by age band — child (0-17), adult (18-64), senior (65+).
          required: false
          schema:
            type: string
            enum: [child, adult, senior]
        - name: sort
          in: query
          description: >
            Sort order. `name` = surname A-Z, `age` = oldest first,
            `recent` = most recent vaccination first.
          required: false
          schema:
            type: string
            enum: [name, age, recent]
            default: name
        - name: limit
          in: query
          description: Page size.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: offset
          in: query
          description: Number of items to skip (for paging).
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: The matching page of patients.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /patients/{patientId}:
    parameters:
      - $ref: '#/components/parameters/PatientId'
    get:
      operationId: getPatient
      tags: [Patients]
      summary: Get one patient
      description: Full demographics plus the derived counts shown in the header.
      responses:
        '200':
          description: The patient.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /patients/{patientId}/vaccinations:
    parameters:
      - $ref: '#/components/parameters/PatientId'
    get:
      operationId: listVaccinations
      tags: [Vaccinations]
      summary: List a patient's vaccinations
      description: >
        Flat, unsorted list of the patient's recorded doses. The UI groups them
        by target disease and sorts within each group; the backend need not.
      responses:
        '200':
          description: The patient's vaccination history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vaccination'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: recordVaccination
      tags: [Vaccinations]
      summary: Record a new vaccination (producer step)
      description: |
        Records a newly administered dose for the patient. This is the
        **producer** action of the challenge: the backend maps the submitted
        fields onto a **CH VACD Immunization Administration Document** and
        persists it via the platform layer into the openEHR CDR.

        `disease` may be omitted — the backend is expected to infer the target
        disease(s) from the chosen `vaccine` (the prototype does this client-side
        in `inferDiseaseFromVaccine`). Send it only to override the inference.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaccinationCreate'
      responses:
        '201':
          description: The vaccination was recorded.
          headers:
            Location:
              description: URL of the created vaccination.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vaccination'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /patients/{patientId}/vaccinations/{vaccinationId}:
    parameters:
      - $ref: '#/components/parameters/PatientId'
      - name: vaccinationId
        in: path
        required: true
        description: Server-assigned vaccination id.
        schema:
          type: string
        example: V21
    get:
      operationId: getVaccination
      tags: [Vaccinations]
      summary: Get one vaccination
      responses:
        '200':
          description: The vaccination.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vaccination'
        '404':
          $ref: '#/components/responses/NotFound'

  /catalogs:
    get:
      operationId: getCatalogs
      tags: [Catalogs]
      summary: Get the form's controlled lists
      description: >
        Returns the vaccine, manufacturer, route, site and reason lists that
        populate the "new vaccination" form. One call so the form can render
        offline-friendly dropdowns.
      responses:
        '200':
          description: The catalogs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalogs'

components:
  parameters:
    PatientId:
      name: patientId
      in: path
      required: true
      description: Patient id, e.g. `P-1042`.
      schema:
        type: string
      example: P-1042

  responses:
    BadRequest:
      description: A query parameter was malformed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: The referenced resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: The body was well-formed but failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Sex:
      type: string
      description: Administrative sex.
      enum: [M, F]

    Route:
      type: string
      description: Route of administration.
      enum: [i.m., s.c., i.d., oral, nasal]

    AmountUnit:
      type: string
      description: Unit of the administered quantity.
      enum: [ml, Dosis, Tropfen]

    Practitioner:
      type: object
      description: A vaccinating doctor.
      required: [name, gln]
      properties:
        name:
          type: string
          example: Dr. med. Sarah Müller
        title:
          type: string
          example: Fachärztin Allgemeine Innere Medizin FMH
        gln:
          type: string
          description: Global Location Number (Swiss health professional identifier).
          example: '7601000123456'
        praxis:
          type: string
          example: Hausarztpraxis Bahnhofstrasse
        address:
          type: string
          example: Bahnhofstrasse 47, 8001 Zürich
        initials:
          type: string
          example: SM

    Patient:
      type: object
      description: Patient demographics as stored by the practice.
      required: [id, firstName, lastName, dob, sex]
      properties:
        id:
          type: string
          example: P-1042
        firstName:
          type: string
          example: Anna
        lastName:
          type: string
          example: Schmid
        dob:
          type: string
          format: date
          description: Date of birth (ISO 8601, yyyy-mm-dd).
          example: '1985-03-12'
        sex:
          $ref: '#/components/schemas/Sex'
        address:
          type: string
          example: Bahnhofstrasse 23, 8001 Zürich
        email:
          type: string
          format: email
          example: anna.schmid@bluewin.ch
        phone:
          type: string
          example: '+41 79 234 56 78'
        ahv:
          type: string
          description: Swiss social-security (AHV/AVS) number.
          example: 756.1234.5678.90

    PatientSummary:
      description: A patient plus the derived counts shown in the list and header.
      allOf:
        - $ref: '#/components/schemas/Patient'
        - type: object
          required: [age, vaccinationCount]
          properties:
            age:
              type: integer
              description: Whole years between date of birth and today.
              example: 40
            vaccinationCount:
              type: integer
              description: Number of recorded vaccinations.
              example: 20
            lastVaccinationDate:
              type: [string, 'null']
              format: date
              description: Date of the most recent recorded dose, or null if none.
              example: '2025-10-14'

    PatientListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PatientSummary'
        total:
          type: integer
          description: Total number of patients matching the filters (before paging).
          example: 11

    Quantity:
      type: object
      description: The administered amount.
      required: [value, unit]
      properties:
        value:
          type: number
          example: 0.5
        unit:
          $ref: '#/components/schemas/AmountUnit'

    Vaccination:
      type: object
      description: |
        A single administered dose, in the UI's domain shape. Core fields mirror
        the Swiss Impfausweis / FHIR Immunization; the extended fields capture
        what the entry form collects.
      required: [id, disease, vaccine, date, dose, manufacturer, batch, route, site]
      properties:
        id:
          type: string
          description: Server-assigned id.
          example: V21
        patientId:
          type: string
          example: P-1042
        disease:
          type: string
          description: Target disease(s); used to group entries in the UI.
          example: Diphtherie, Tetanus, Pertussis, Polio
        vaccine:
          type: string
          description: Trade name of the administered product.
          example: Boostrix Polio
        date:
          type: string
          format: date
          description: Date the dose was given (yyyy-mm-dd).
          example: '2026-05-28'
        dose:
          type: string
          description: >
            Display label for the dose within a series, e.g. "1/3", "Booster" or
            "Saison 25/26". Derived by the backend from doseNumber/doseTotal when
            those are supplied.
          example: 1/3
        manufacturer:
          type: string
          example: GlaxoSmithKline
        batch:
          type: string
          description: Lot / batch number from the package.
          example: BP2408
        route:
          $ref: '#/components/schemas/Route'
        site:
          type: string
          description: Anatomical site of administration.
          example: Oberarm links (M. deltoideus)
        quantity:
          $ref: '#/components/schemas/Quantity'
        reason:
          type: string
          description: Reason for vaccination (one of the catalog's reasons).
          example: Grundimmunisierung
        doseNumber:
          type: integer
          description: Dose number within the series (omit for a booster).
          example: 1
        doseTotal:
          type: integer
          description: Total doses in the series.
          example: 3
        expiry:
          type: string
          format: date
          description: Vaccine expiry date from the package.
        organization:
          type: string
          description: Administering organisation / practice.
          example: Hausarztpraxis Bahnhofstrasse, Zürich
        adverseReaction:
          type: [string, 'null']
          description: Observed adverse reaction (UAW), if any. Reportable to Swissmedic.
        note:
          type: string
          description: Free-text note.

    VaccinationCreate:
      type: object
      description: Payload for recording a new vaccination. Mirrors the entry form.
      required: [vaccine, date, manufacturer, batch, route, quantity, site, reason]
      properties:
        vaccine:
          type: string
          example: Boostrix Polio
        date:
          type: string
          format: date
          example: '2026-05-28'
        manufacturer:
          type: string
          example: GlaxoSmithKline
        batch:
          type: string
          example: BP2408
        route:
          $ref: '#/components/schemas/Route'
        quantity:
          $ref: '#/components/schemas/Quantity'
        site:
          type: string
          example: Oberarm links (M. deltoideus)
        reason:
          type: string
          example: Grundimmunisierung
        disease:
          type: string
          description: >
            Optional. Omit to let the backend infer the target disease(s) from
            the vaccine; send to override.
          example: Diphtherie, Tetanus, Pertussis, Polio
        doseNumber:
          type: integer
          description: Dose number within the series (omit for a booster).
          example: 1
        doseTotal:
          type: integer
          example: 3
        expiry:
          type: string
          format: date
        organization:
          type: string
          example: Hausarztpraxis Bahnhofstrasse, Zürich
        adverseReaction:
          type: string
          description: Free text describing an observed adverse reaction (UAW).
        note:
          type: string

    RouteOption:
      type: object
      description: A route value with a human-readable label for the form.
      required: [value, label]
      properties:
        value:
          $ref: '#/components/schemas/Route'
        label:
          type: string
          example: i.m. (intramuskulär)

    Catalogs:
      type: object
      description: Controlled lists that drive the entry form's dropdowns.
      required: [vaccines, manufacturers, routes, sites, reasons]
      properties:
        vaccines:
          type: array
          items:
            type: string
          example: [Boostrix, Boostrix Polio, Comirnaty (BNT162b2), Priorix]
        manufacturers:
          type: array
          items:
            type: string
          example: [GlaxoSmithKline, Pfizer, Moderna, MSD, Sanofi]
        routes:
          type: array
          items:
            $ref: '#/components/schemas/RouteOption'
        sites:
          type: array
          items:
            type: string
          example:
            - Oberarm links (M. deltoideus)
            - Oberarm rechts (M. deltoideus)
        reasons:
          type: array
          items:
            type: string
          example: [Grundimmunisierung, Auffrischimpfung (Booster), Reiseimpfung]

    Error:
      type: object
      description: A problem response.
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable, machine-readable error code.
          example: not_found
        message:
          type: string
          description: Human-readable explanation.
          example: No patient with id 'P-9999'.
        details:
          type: array
          description: Optional per-field validation problems.
          items:
            type: object
            properties:
              field:
                type: string
                example: batch
              message:
                type: string
                example: required
