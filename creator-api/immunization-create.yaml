openapi: 3.0.3
info:
  title: Impfkomponenten-Erfassung API
  version: 1.0.0
paths: {}
components:
  schemas:
    ImmunizationCreateDto:
      type: object
      description: "DTO zur Neuerfassung eines Impfeintrags (Request)"
      properties:
        # 1. Impkstoff
        vaccineName:
          type: string
          example: "Boostrix Polio"
          description: "Name des Impfstoffs"
        marketingAuthorizationHolder:
          type: string
          example: "GlaxoSmithKline"
          description: "Zulassungsinhaberin / Hersteller"
        lotNumber:
          type: string
          example: "A1B2C3"
          description: "Chargennummer auf der Impfstoffpackung"
        expiryDate:
          type: string
          format: date
          example: "2028-11-30"
          description: "Verfallsdatum laut Packung (YYYY-MM-DD)"

        # 2. Verabreichung
        vaccinationDate:
          type: string
          format: date
          example: "2026-05-28"
          description: "Impfdatum (YYYY-MM-DD)"
        routeOfAdministration:
          type: string
          enum: [i.m., s.c., i.d., oral, nasal]
          example: "i.m."
          description: "Applikationsweg (z.B. intramuskulär)"
        administeredDose:
          type: object
          description: "Verabreichte Menge mit Einheit"
          properties:
            value:
              type: number
              format: float
              example: 0.5
            unit:
              type: string
              enum: [ml]
              example: "ml"
          required:
            - value
            - unit
        siteOfAdministration:
          type: string
          example: "Oberarm links (M. deltoideus)"
          description: "Applikationsort / Injektionsstelle"

        # 3. Klinischer Kontext
        reason:
          type: string
          example: "Grundimmunisierung"
          description: "Impfgrund (z. B. Grundimmunisierung, Auffrischimpfung)"
        doseNumber:
          type: integer
          minimum: 1
          example: 2
          description: "Dosisnummer in der aktuellen Impfserie"
        seriesDoses:
          type: integer
          minimum: 1
          example: 3
          description: "Empfohlene Gesamtzahl an Dosen der Impfserie (leer lassen falls Booster)"
        adverseReactionObserved:
          type: boolean
          example: false
          description: "Unerwünschte Reaktion nach Impfung (UAW) beobachtet"

      required:
        - vaccineName
        - marketingAuthorizationHolder
        - lotNumber
        - vaccinationDate
        - routeOfAdministration
        - administeredDose
        - siteOfAdministration
        - reason
        - doseNumber
        - adverseReactionObserved